[build]
  command = "npm run build"
  publish = ".next"
  functions = "netlify/functions"

# Configuración del scanner de secretos
# Las claves NEXT_PUBLIC_* son seguras de exponer (son públicas en Next.js)
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[functions]
  node_bundler = "esbuild"

# Scheduled function for daily summary at 9am Lima time (14:00 UTC)
[functions."daily-summary"]
  schedule = "0 14 * * 1-5"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
