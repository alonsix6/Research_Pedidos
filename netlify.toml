[build]
  command = "npm run build"
  publish = ".next"
  functions = "netlify/functions"

# Configuración del scanner de secretos
# Las claves NEXT_PUBLIC_* son seguras de exponer (son públicas en Next.js)
[build.environment]
  NODE_VERSION = "22"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_TEAM_ID,TEAM_ID"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"
    # Legacy XSS protection
    X-XSS-Protection = "1; mode=block"
    # HSTS - Force HTTPS for 1 year
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Referrer Policy - Don't leak referrer to external sites
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Permissions Policy - Disable unnecessary features
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    # Content Security Policy
    # Nota: Next.js requiere 'unsafe-inline' para styles (CSS-in-JS runtime)
    # 'unsafe-eval' removido para mayor seguridad
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.telegram.org; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
